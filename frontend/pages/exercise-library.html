<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Exercise Library — Reprise</title>
  <link rel="icon" href="/static/assets/logo.png">
  <link rel="stylesheet" href="/static/css/main.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <link rel="stylesheet" href="/static/css/workout.css">
</head>
<body class="app-layout">
  <button class="mobile-menu-btn" id="mobile-menu-btn">☰</button>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main-content">
    <div class="page-header flex-between">
      <div><h1>Exercise Library</h1><p>120+ exercises — search, filter, and view your PRs</p></div>
      <button class="btn btn-primary" onclick="openModal('custom-modal')">+ Custom Exercise</button>
    </div>

    <div class="card mb-xl">
      <div class="search-wrap mb-md">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" class="form-control" placeholder="Search exercises..." oninput="loadExercises()">
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:8px" id="cat-pills">
        <button class="btn btn-primary btn-sm" onclick="setCategory('',this)">All</button>
        <button class="btn btn-ghost btn-sm" onclick="setCategory('chest',this)">Chest</button>
        <button class="btn btn-ghost btn-sm" onclick="setCategory('back',this)">Back</button>
        <button class="btn btn-ghost btn-sm" onclick="setCategory('shoulders',this)">Shoulders</button>
        <button class="btn btn-ghost btn-sm" onclick="setCategory('arms',this)">Arms</button>
        <button class="btn btn-ghost btn-sm" onclick="setCategory('legs',this)">Legs</button>
        <button class="btn btn-ghost btn-sm" onclick="setCategory('core',this)">Core</button>
        <button class="btn btn-ghost btn-sm" onclick="setCategory('skill',this)">Skills</button>
        <button class="btn btn-ghost btn-sm" onclick="setCategory('full_body',this)">Full Body</button>
      </div>
    </div>

    <div id="exercises-grid" class="grid-2"></div>
  </main>

  <!-- Custom exercise modal -->
  <div class="modal-backdrop" id="custom-modal" style="display:none" onclick="if(event.target===this)closeModal('custom-modal')">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Create Custom Exercise</h3>
        <button class="modal-close" onclick="closeModal('custom-modal')">✕</button>
      </div>
      <form onsubmit="createCustom(event)">
        <div class="form-group mb-md">
          <label class="form-label">Exercise Name</label>
          <input type="text" id="custom-name" class="form-control" placeholder="e.g. Cable Pullover" required>
        </div>
        <div class="form-row mb-md">
          <div class="form-group">
            <label class="form-label">Primary Category</label>
            <select id="custom-cat" class="form-control">
              <option value="chest">Chest</option><option value="back">Back</option>
              <option value="shoulders">Shoulders</option><option value="arms">Arms</option>
              <option value="legs">Legs</option><option value="core">Core</option>
              <option value="full_body">Full Body</option><option value="skill">Skill</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Set Type</label>
            <select id="custom-stype" class="form-control">
              <option value="reps_weight">Reps + Weight</option>
              <option value="reps_only">Reps only</option>
              <option value="time_only">Time only</option>
              <option value="time_weight">Time + Weight</option>
            </select>
          </div>
        </div>
        <!-- Multi-muscle toggle grid -->
        <div class="form-group mb-lg">
          <label class="form-label">Muscle Groups Worked <span style="font-size:0.7rem;color:var(--text-muted)">(select all that apply)</span></label>
          <div id="muscle-toggle-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px">
            <button type="button" class="muscle-toggle-btn" data-muscle="chest" onclick="toggleMuscle(this)">💪 Chest</button>
            <button type="button" class="muscle-toggle-btn" data-muscle="back" onclick="toggleMuscle(this)">🔙 Back</button>
            <button type="button" class="muscle-toggle-btn" data-muscle="shoulders" onclick="toggleMuscle(this)">🎯 Shoulders</button>
            <button type="button" class="muscle-toggle-btn" data-muscle="triceps" onclick="toggleMuscle(this)">💥 Triceps</button>
            <button type="button" class="muscle-toggle-btn" data-muscle="biceps" onclick="toggleMuscle(this)">🦾 Biceps</button>
            <button type="button" class="muscle-toggle-btn" data-muscle="forearms" onclick="toggleMuscle(this)">🤜 Forearms</button>
            <button type="button" class="muscle-toggle-btn" data-muscle="quads" onclick="toggleMuscle(this)">🦵 Quads</button>
            <button type="button" class="muscle-toggle-btn" data-muscle="hamstrings" onclick="toggleMuscle(this)">🦵 Hamstrings</button>
            <button type="button" class="muscle-toggle-btn" data-muscle="glutes" onclick="toggleMuscle(this)">🍑 Glutes</button>
            <button type="button" class="muscle-toggle-btn" data-muscle="calves" onclick="toggleMuscle(this)">🦶 Calves</button>
            <button type="button" class="muscle-toggle-btn" data-muscle="core" onclick="toggleMuscle(this)">🔥 Core</button>
            <button type="button" class="muscle-toggle-btn" data-muscle="traps" onclick="toggleMuscle(this)">🏔️ Traps</button>
          </div>
          <div style="font-size:0.75rem;color:var(--text-muted);margin-top:8px">Selected: <span id="selected-muscles-preview" style="color:var(--violet-l)">None</span></div>
        </div>
        <!-- Equipment Needed (Multi-Select) -->
        <div class="form-group mb-md">
          <label class="form-label">Equipment Needed <span style="font-size:.75rem;color:var(--text-muted)">(select all that apply)</span></label>
          <div id="equipment-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px">
            <button type="button" class="muscle-toggle-btn" data-equip="bodyweight" onclick="toggleEquip(this)">🤸 Bodyweight</button>
            <button type="button" class="muscle-toggle-btn" data-equip="barbell" onclick="toggleEquip(this)">🌪️ Barbell</button>
            <button type="button" class="muscle-toggle-btn" data-equip="dumbbell" onclick="toggleEquip(this)">💪 Dumbbell</button>
            <button type="button" class="muscle-toggle-btn" data-equip="cable" onclick="toggleEquip(this)">🔗 Cable</button>
            <button type="button" class="muscle-toggle-btn" data-equip="machine" onclick="toggleEquip(this)">⚙️ Machine</button>
            <button type="button" class="muscle-toggle-btn" data-equip="kettlebell" onclick="toggleEquip(this)">🔔 Kettlebell</button>
            <button type="button" class="muscle-toggle-btn" data-equip="resistance_band" onclick="toggleEquip(this)">🏎️ Band</button>
            <button type="button" class="muscle-toggle-btn" data-equip="pull_up_bar" onclick="toggleEquip(this)">🛠️ Pull-Up Bar</button>
            <button type="button" class="muscle-toggle-btn" data-equip="bench" onclick="toggleEquip(this)">🛋️ Bench</button>
          </div>
          <div style="font-size:.75rem;color:var(--text-muted);margin-top:8px">Selected: <span id="selected-equip-preview" style="color:var(--accent-teal)">None</span></div>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Submit for Approval</button>
      </form>
    </div>
  </div>

  <!-- Edit exercise modal (Admin) -->
  <div class="modal-backdrop" id="edit-modal" style="display:none" onclick="if(event.target===this)closeModal('edit-modal')">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Edit Exercise</h3>
        <button class="modal-close" onclick="closeModal('edit-modal')">✕</button>
      </div>
      <form onsubmit="saveEditExercise(event)">
        <input type="hidden" id="edit-id">
        <div class="form-group mb-md">
          <label class="form-label">Exercise Name</label>
          <input type="text" id="edit-name" class="form-control" required>
        </div>
        <div class="form-row mb-md">
          <div class="form-group">
            <label class="form-label">Category</label>
            <select id="edit-cat" class="form-control">
              <option value="chest">Chest</option><option value="back">Back</option>
              <option value="shoulders">Shoulders</option><option value="arms">Arms</option>
              <option value="legs">Legs</option><option value="core">Core</option>
              <option value="full_body">Full Body</option><option value="skill">Skill</option>
              <option value="cardio">Cardio</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Set Type</label>
            <select id="edit-stype" class="form-control">
              <option value="reps_weight">Reps + Weight</option>
              <option value="reps_only">Reps only</option>
              <option value="time_only">Time only</option>
              <option value="time_weight">Time + Weight</option>
            </select>
          </div>
        </div>
        <div class="form-group mb-md">
          <label class="form-label">Muscles / Tags</label>
          <input type="text" id="edit-muscles" class="form-control" placeholder="e.g. chest, triceps">
        </div>
        <div class="form-group mb-md">
          <label class="form-label">Equipment</label>
          <input type="text" id="edit-equipment" class="form-control" placeholder="e.g. barbell, bench">
        </div>
        <button type="submit" class="btn btn-primary btn-full">Save Changes</button>
      </form>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script src="/static/js/utils.js"></script>
  <script src="/static/js/api.js"></script>
  <style>
    .muscle-toggle-btn {
      padding: 8px 6px;
      font-size: 0.78rem;
      font-weight: 600;
      border: 1px solid var(--bg-border);
      border-radius: var(--radius-sm);
      background: var(--bg-surface);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s ease;
      text-align: center;
    }
    .muscle-toggle-btn:hover { border-color: var(--violet); color: var(--text-primary); }
    .muscle-toggle-btn.active {
      background: rgba(139,92,246,0.15);
      border-color: var(--violet);
      color: var(--violet-l);
    }
  </style>
  <script>
    let currentCategory = '';

    onReady(() => {
      requireAuth(); renderSidebar(); initMobileSidebar();
      loadExercises();
    });

    function toggleMuscle(btn) {
      btn.classList.toggle('active');
      const selected = Array.from(document.querySelectorAll('#muscle-toggle-grid .muscle-toggle-btn.active'))
        .map(b => b.dataset.muscle);
      document.getElementById('selected-muscles-preview').textContent = selected.length ? selected.join(', ') : 'None';
    }

    function toggleEquip(btn) {
      btn.classList.toggle('active');
      const selected = Array.from(document.querySelectorAll('#equipment-grid .muscle-toggle-btn.active'))
        .map(b => b.dataset.equip);
      document.getElementById('selected-equip-preview').textContent = selected.length ? selected.join(', ') : 'None';
    }

    function setCategory(cat, btn) {
      currentCategory = cat;
      document.querySelectorAll('#cat-pills .btn').forEach(b => { b.className='btn btn-ghost btn-sm'; });
      btn.className = 'btn btn-primary btn-sm';
      loadExercises();
    }

    let _t;
    async function loadExercises() {
      clearTimeout(_t);
      _t = setTimeout(async () => {
        const q   = document.getElementById('search-input').value;
        let url   = `/api/exercises?limit=80&q=${encodeURIComponent(q)}`;
        if (currentCategory) url += `&category=${currentCategory}`;
        const data = await apiFetch(url, {}, false);
        if (data._error) return;
        const grid = document.getElementById('exercises-grid');
        if (!data.length) {
          grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🔍</div><h3>No exercises found</h3><p>Try a different search or <button class="btn btn-ghost btn-sm" onclick="openModal('custom-modal')">create a custom one</button></p></div>`;
          return;
        }
        
        const user = getUser();
        const isAdmin = user && user.role === 'admin';

        grid.innerHTML = data.map(ex => {
          // Determine status badge for this exercise card
          let statusBadge = '';
          if (ex.status === 'pending') {
            statusBadge = '<span class="badge badge-amber" style="font-size:0.6rem;padding:2px 4px">⏳ Pending approval</span>';
          } else if (ex.status === 'rejected') {
            statusBadge = '<span class="badge" style="font-size:0.6rem;padding:2px 6px;background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.3)">🔒 Rejected — private exercise only</span>';
          }
          return `
          <div class="card card-sm" id="ex-card-${ex.id}">
            <div class="flex-between mb-sm">
              <span style="font-size:1.3rem">${categoryIcon(ex.category)}</span>
              ${setTypeBadge(ex.set_type)}
            </div>
            <div style="font-weight:700;font-size:.95rem;margin-bottom:4px">${escHtml(ex.name)}</div>
            ${statusBadge ? `<div style="margin-bottom:6px">${statusBadge}</div>` : ''}
            <div style="font-size:.75rem;color:var(--text-muted)">${ex.category.replace('_',' ')} · ${ex.muscles_tags || ex.muscles || ''}</div>
            ${ex.equipment ? `<div style="font-size:.7rem;color:var(--text-xmuted);margin-top:4px">🛠 ${ex.equipment}</div>` : ''}
            
            ${isAdmin ? `
            <div style="margin-top:12px; display:flex; gap:6px; border-top:1px solid rgba(255,255,255,0.05); padding-top:8px">
              <button class="btn btn-ghost btn-sm" onclick="openEditExercise(${ex.id}, '${escHtml(ex.name)}', '${ex.category}', '${ex.set_type}', '${escHtml(ex.muscles_tags || ex.muscles || '')}', '${escHtml(ex.equipment || '')}')">✎ Edit</button>
              <button class="btn btn-ghost btn-sm" style="color:var(--red)" onclick="deleteExercise(${ex.id}, '${escHtml(ex.name)}')">🗑 Delete</button>
            </div>
            ` : ''}
          </div>`;
        }).join('');
      }, 200);
    }


    async function createCustom(e) {
      e.preventDefault();
      const selectedMuscles = Array.from(document.querySelectorAll('#muscle-toggle-grid .muscle-toggle-btn.active'))
        .map(b => b.dataset.muscle);
      if (!selectedMuscles.length) {
        showToast('Please select at least one muscle group', 'warning');
        return;
      }
      const selectedEquip = Array.from(document.querySelectorAll('#equipment-grid .muscle-toggle-btn.active'))
        .map(b => b.dataset.equip);
      const muscleTagStr = selectedMuscles.join(', ');
      const equipStr    = selectedEquip.length ? selectedEquip.join(', ') : 'bodyweight';
      const primaryCat  = document.getElementById('custom-cat').value;

      const res = await apiFetch('/api/exercises/custom', {
        method: 'POST',
        body: {
          name:         document.getElementById('custom-name').value.trim(),
          category:     primaryCat,
          set_type:     document.getElementById('custom-stype').value,
          muscles:      muscleTagStr,
          muscles_tags: muscleTagStr,
          equipment:    equipStr,
        }
      });
      if (!res._error) {
        showToast(res.message || 'Exercise submitted for admin approval!', 'success');
        closeModal('custom-modal');
        // Reset all toggles
        document.querySelectorAll('#muscle-toggle-grid .muscle-toggle-btn.active, #equipment-grid .muscle-toggle-btn.active')
          .forEach(b => b.classList.remove('active'));
        document.getElementById('selected-muscles-preview').textContent = 'None';
        document.getElementById('selected-equip-preview').textContent   = 'None';
        document.getElementById('custom-name').value = '';
        loadExercises();
      }
    }

    function openEditExercise(id, name, cat, stype, muscles, equipment) {
      document.getElementById('edit-id').value = id;
      document.getElementById('edit-name').value = name;
      document.getElementById('edit-cat').value = cat || 'full_body';
      document.getElementById('edit-stype').value = stype || 'reps_weight';
      document.getElementById('edit-muscles').value = muscles || '';
      document.getElementById('edit-equipment').value = equipment || '';
      openModal('edit-modal');
    }

    async function saveEditExercise(e) {
      e.preventDefault();
      const id = document.getElementById('edit-id').value;
      const res = await apiFetch(`/api/exercises/${id}`, {
        method: 'PUT',
        body: {
          name: document.getElementById('edit-name').value,
          category: document.getElementById('edit-cat').value,
          set_type: document.getElementById('edit-stype').value,
          muscles_tags: document.getElementById('edit-muscles').value,
          equipment: document.getElementById('edit-equipment').value
        }
      });
      if (!res._error) {
        showToast('Exercise updated successfully', 'success');
        closeModal('edit-modal');
        loadExercises();
      }
    }

    async function deleteExercise(id, name) {
      if (!confirm(`Are you sure you want to delete "${name}"?`)) return;
      
      const res = await apiFetch(`/api/exercises/${id}`, { method: 'DELETE' });
      if (!res._error) {
        showToast('Exercise deleted', 'info');
        loadExercises();
      }
    }
  </script>
</body>
</html>

<!-- 
English Summary:
This HTML file structures the Exercise Library database view. It includes the search bar, 
category filters, and the modal form for proposing custom exercises.

סיכום בעברית:
ספריית התרגילים של האתר. הקובץ בונה את שורת החיפוש, את כפתורי הסינון (לפי שרירים
או קטגוריות), ואת המבנה הכללי שמציג את כל עשרות התרגילים המובנים במערכת עם התמונות וההסברים.
-->
