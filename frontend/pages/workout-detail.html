<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Workout Detail — Reprise</title>
  <link rel="icon" href="/static/assets/logo.png">
  <link rel="stylesheet" href="/static/css/main.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <link rel="stylesheet" href="/static/css/workout.css">
</head>
<body class="app-layout">
  <button class="mobile-menu-btn" id="mobile-menu-btn">☰</button>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main-content">
    <div class="page-header flex-between">
      <div>
        <div style="font-size:.82rem;color:var(--text-muted);margin-bottom:4px"><a href="/workout-history.html">← History</a></div>
        <h1 id="workout-title">Loading...</h1>
        <p id="workout-meta"></p>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary btn-sm" onclick="analyzeSession()" id="analyze-btn">✨ Analyze Session</button>
        <button class="btn btn-outline btn-sm" id="edit-btn">✏️ Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteWorkout()">🗑 Delete</button>
      </div>
    </div>

    <!-- AI Recap -->
    <div id="ai-recap-card" class="card mb-xl" style="display:none;background:rgba(139,92,246,0.1);border:1px solid var(--violet)">
      <div class="card-title mb-sm" style="color:var(--violet-l)"><span style="font-size:1.2rem">🤖</span> Coach Analysis</div>
      <p id="ai-recap-text" style="color:var(--text-secondary);font-size:.95rem;line-height:1.5"></p>
    </div>

    <!-- Summary stats -->
    <div class="stats-grid mb-xl" id="workout-stats"></div>

    <!-- Notes -->
    <div id="workout-notes-card" class="card mb-xl" style="display:none">
      <div class="card-title mb-sm">Notes</div>
      <p id="workout-notes" style="color:var(--text-secondary);font-size:.9rem"></p>
    </div>

  <div id="toast-container" class="toast-container"></div>
  <script src="/static/js/utils.js"></script>
  <script src="/static/js/api.js"></script>
  <script>
    let WORKOUT_ID;
    onReady(async () => {
      requireAuth(); renderSidebar(); initMobileSidebar();
      WORKOUT_ID = new URLSearchParams(location.search).get('id');
      if (!WORKOUT_ID) { window.location.href='/workout-history.html'; return; }
      document.getElementById('edit-btn').href = `/log-workout.html?workout_id=${WORKOUT_ID}`;
      await loadWorkout();
    });

    async function loadWorkout() {
      const w = await apiFetch(`/api/workouts/${WORKOUT_ID}`);
      if (!w || w._error) { showToast('Workout not found','error'); return; }

      let headerHtml = `
        <div style="flex:1">
          <div style="font-size:.82rem;color:var(--text-muted);margin-bottom:4px"><a href="/workout-history.html">← History</a></div>
          <h1 id="workout-title" style="margin:0">${w.name || 'Session'}</h1>
          <div id="workout-meta" style="color:var(--text-muted);font-size:.85rem;margin-top:4px">${formatDate(w.workout_date)} ${w.duration_minutes ? ` · ${formatDuration(w.duration_minutes)}` : ''}</div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-primary btn-sm" onclick="analyzeSession()" id="analyze-btn">✨ Analyze Session</button>
          <a id="edit-btn" href="/log-workout.html?workout_id=${w.id}" class="btn btn-outline btn-sm">Edit</a>
          <button class="btn btn-danger btn-sm" onclick="deleteWorkout()">🗑 Delete</button>
        </div>
      `;

      if (w.previous_stats) {
         headerHtml += `
         <div style="width:100%;margin-top:12px;padding:12px;background:rgba(139,92,246,0.1);border-left:3px solid var(--violet);border-radius:4px;font-size:0.85rem">
            <strong>Previous Preset Run:</strong> ${formatDate(w.previous_stats.date)} 
            · Vol: ${w.previous_stats.volume_kg} kg 
            · <a href="/workout-detail.html?id=${w.previous_stats.id}">View</a>
         </div>
         `;
      }
      
      document.querySelector('.page-header.flex-between').innerHTML = headerHtml;
      document.querySelector('.page-header.flex-between').style.flexWrap = 'wrap';

      const totalSets = w.exercises?.reduce((n,e) => n + (e.sets?.length||0), 0) || 0;
      let totalVol = 0;
      w.exercises?.forEach(ex => ex.sets?.forEach(s => {
        if (!s.is_warmup) totalVol += (s.weight_kg||0) * (s.reps||s.duration_seconds||1);
      }));

      document.getElementById('workout-stats').innerHTML = `
        <div class="stat-card"><div class="stat-icon">🏋️</div><div class="stat-value">${w.exercises?.length||0}</div><div class="stat-label">Exercises</div></div>
        <div class="stat-card"><div class="stat-icon">📦</div><div class="stat-value">${totalSets}</div><div class="stat-label">Total Sets</div></div>
        <div class="stat-card"><div class="stat-icon">⚡</div><div class="stat-value">${Math.round(totalVol)}</div><div class="stat-label">Volume (kg)</div></div>
        <div class="stat-card"><div class="stat-icon">⏱️</div><div class="stat-value">${formatDuration(w.duration_minutes)}</div><div class="stat-label">Duration</div></div>
      `;
      
      highlightMuscles(w.exercises);

      if (w.notes) {
        document.getElementById('workout-notes-card').style.display = 'block';
        document.getElementById('workout-notes').textContent = w.notes;
      }

      const container = document.getElementById('exercises-view');
      if (!w.exercises?.length) {
        container.innerHTML = `<div class="empty-state"><div class="empty-icon">💪</div><h3>No exercises logged</h3></div>`;
        return;
      }

      container.innerHTML = w.exercises.map(ex => `
        <div class="card mb-md">
          <div class="flex-between mb-lg">
            <div>
              <div style="font-weight:700;font-size:1rem">${ex.exercise_name}</div>
              <div style="font-size:.75rem;color:var(--text-muted);margin-top:2px">${ex.category?.replace('_',' ')||''} · ${ex.muscles||''}</div>
            </div>
            <div style="display:flex;gap:8px;align-items:center">
              ${setTypeBadge(ex.set_type)}
              <a href="/progress.html?exercise_id=${ex.exercise_id}" class="btn btn-ghost btn-sm">📈 Progress</a>
            </div>
          </div>
          <div class="table-wrapper">
            <table class="table">
              <thead><tr>${buildSetTableHeaders(ex.set_type)}</tr></thead>
              <tbody>${(ex.sets||[]).map(s => buildSetTableRow(s, ex.set_type)).join('')}</tbody>
            </table>
          </div>
        </div>
      `).join('');

      // Build Muscle Map HUD
      const maps = {
        'chest': ['muscle-chest'],
        'back': ['muscle-back'],
        'shoulders': ['muscle-shoulders-fwd-l','muscle-shoulders-fwd-r','muscle-shoulders-bwd-l','muscle-shoulders-bwd-r'],
        'arms': ['muscle-arms-fwd-l','muscle-arms-fwd-r','muscle-arms-bwd-l','muscle-arms-bwd-r'],
        'legs': ['muscle-legs-fwd-l','muscle-legs-fwd-r','muscle-legs-bwd-l','muscle-legs-bwd-r'],
        'core': ['muscle-core']
      };
      
      const usedCategories = new Set(w.exercises.map(e => e.category?.toLowerCase()).filter(Boolean));
      // Read specific musculature keywords
      const allMusclesStr = w.exercises.map(e => e.muscles||'').join(' ').toLowerCase();
      
      // Additional fallback logic
      if (allMusclesStr.includes('abs') || allMusclesStr.includes('core')) usedCategories.add('core');
      if (allMusclesStr.includes('bicep') || allMusclesStr.includes('tricep')) usedCategories.add('arms');
      
      usedCategories.forEach(cat => {
        if (maps[cat]) {
          maps[cat].forEach(id => {
            const el = document.getElementById(id);
            if (el) {
              el.setAttribute('fill', 'url(#neon)');
              el.setAttribute('stroke', '#F59E0B');
            }
          });
        }
      });
    }

    function buildSetTableHeaders(setType) {
      let h = '<th>Set</th>';
      if (setType === 'reps_weight')  h += '<th>Performance</th>';
      if (setType === 'reps_only')    h += '<th>Reps</th>';
      if (setType === 'time_only')    h += '<th>Time</th>';
      if (setType === 'time_weight')  h += '<th>Performance</th>';
      h += '<th>RPE</th><th></th>';
      return h;

    function buildSetTableRow(s, setType) {
      const setLabel = s.is_warmup ? '<span class="badge badge-muted">W</span>' : `<strong>${s.set_number}</strong>`;
      let performance = '';
      if (setType === 'reps_weight')  performance = `<td><span style="font-weight:600">${s.weight_kg||0}kg</span> × ${s.reps||0}</td>`;
      if (setType === 'reps_only')    performance = `<td>${s.reps||0} reps</td>`;
      if (setType === 'time_only')    performance = `<td>${formatSeconds(s.duration_seconds)}</td>`;
      if (setType === 'time_weight')  performance = `<td><span style="font-weight:600">${s.weight_kg||0}kg</span> × ${formatSeconds(s.duration_seconds)}</td>`;
      const rpe = s.rpe ? `<span style="color:var(--violet-l)">${s.rpe}</span>` : '—';
      const indicator = s.is_failure ? '⚠️' : '';
      return `<tr style="${s.is_warmup?'opacity:.6':''}"><td>${setLabel}</td>${performance}<td>${rpe}</td><td>${indicator}</td></tr>`;
    }

    function highlightMuscles(exercises) {
      if (!exercises || exercises.length === 0) return;
      
      const muscleList = new Set();
      exercises.forEach(ex => {
        if (ex.muscles) {
          ex.muscles.split(',').map(m => m.trim().toLowerCase()).forEach(m => muscleList.add(m));
        }
      });
      
      const map = {
        'chest': ['f-chest', 'ff-chest'],
        'shoulders': ['f-shoulder-l', 'f-shoulder-r', 'ff-shoulder-l', 'ff-shoulder-r', 'b-shoulder-l', 'b-shoulder-r', 'bf-shoulder-l', 'bf-shoulder-r'],
        'biceps': ['f-bicep-l', 'f-bicep-r', 'ff-bicep-l', 'ff-bicep-r'],
        'triceps': ['b-tricep-l', 'b-tricep-r', 'bf-tricep-l', 'bf-tricep-r'],
        'forearms': ['f-forearm-l', 'f-forearm-r', 'ff-forearm-l', 'ff-forearm-r', 'b-forearm-bl', 'b-forearm-br'],
        'core': ['f-core', 'ff-core'],
        'lats': ['b-lat-l', 'b-lat-r', 'bf-lat-l', 'bf-lat-r'],
        'lower back': ['b-lowerback', 'bf-lowerback'],
        'traps': ['b-traps', 'bf-traps'],
        'mid back': ['b-midback', 'bf-midback'],
        'quads': ['f-quad-l', 'f-quad-r', 'ff-quad-l', 'ff-quad-r'],
        'hamstrings': ['b-hamstring-l', 'b-hamstring-r', 'bf-hamstring-l', 'bf-hamstring-r'],
        'glutes': ['b-glute-l', 'b-glute-r', 'bf-glute-l', 'bf-glute-r'],
        'calves': ['f-calf-l', 'f-calf-r', 'ff-calf-l', 'ff-calf-r', 'b-calf-l', 'b-calf-r', 'bf-calf-l', 'bf-calf-r'],
      };
      
      muscleList.forEach(m => {
        let targets = map[m];
        if (!targets && m.includes('back')) targets = map['mid back'];
        if (targets) {
           targets.forEach(id => {
             const el = document.getElementById(id);
             if (el) {
                el.style.fill = 'url(#target-grad)';
                el.style.filter = 'url(#glow)';
                el.style.stroke = '#F59E0B';
             }
           });
        }
      });
      
      const chips = document.getElementById('muscles-chips');
      if (chips) {
        chips.innerHTML = Array.from(muscleList).map(m => `<span class="badge badge-primary" style="text-transform:capitalize">${m}</span>`).join('');
      }
    }

    async function analyzeSession() {
      const btn = document.getElementById('analyze-btn');
      btn.textContent = 'Analyzing...';
      btn.disabled = true;
      const res = await apiFetch(`/api/ai/analyze-workout/${WORKOUT_ID}`, { method:'POST' }, false);
      btn.textContent = '✨ Analyze Session';
      btn.disabled = false;
      if (!res || res._error) {
        showToast('Analysis failed', 'error');
        return;
      }
      document.getElementById('ai-recap-card').style.display = 'block';
      document.getElementById('ai-recap-text').innerHTML = escapeHtml(res.analysis);
    }

    async function deleteWorkout() {
      if (!confirm('Delete this workout? This cannot be undone.')) return;
      const res = await apiFetch(`/api/workouts/${WORKOUT_ID}`, { method:'DELETE' });
      if (!res._error) window.location.href = '/workout-history.html';
    }
  </script>
</body>
</html>
