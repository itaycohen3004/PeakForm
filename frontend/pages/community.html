<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Community — Reprise</title>
  <link rel="icon" href="/static/assets/logo.png">
  <link rel="stylesheet" href="/static/css/main.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <link rel="stylesheet" href="/static/css/workout.css">
</head>
<body class="app-layout">
  <button class="mobile-menu-btn" id="mobile-menu-btn">☰</button>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main-content">
    <div class="page-header flex-between">
      <div><h1>Community Feed</h1><p>Share your wins, ask questions, stay motivated</p></div>
      <a href="/community-chat.html" class="btn btn-outline">💬 Live Chat</a>
    </div>

    <!-- Post composer -->
    <div class="card mb-xl">
      <div class="form-group mb-md">
        <textarea id="post-content" class="form-control" placeholder="What's your training win today? Share a PR, ask a question, post a tip..." rows="3"></textarea>
      </div>
      <div class="flex-between">
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="type-pill" data-type="update" onclick="setPostType(this)">📢 Update</button>
          <button class="type-pill selected" data-type="achievement" onclick="setPostType(this)">🏆 Achievement</button>
          <button class="type-pill" data-type="question" onclick="setPostType(this)">❓ Question</button>
          <button class="type-pill" data-type="tip" onclick="setPostType(this)">💡 Tip</button>
        </div>
        <button class="btn btn-primary" onclick="submitPost()">Post</button>
      </div>
    </div>

    <!-- Feed -->
    <div id="feed"></div>
    <div id="load-more" style="text-align:center;padding:var(--space-lg);display:none">
      <button class="btn btn-outline" onclick="loadMore()">Load More</button>
    </div>
  </main>

  <!-- Comments modal -->
  <div class="modal-backdrop" id="comments-modal" style="display:none" onclick="if(event.target===this)closeModal('comments-modal')">
    <div class="modal modal-lg">
      <div class="modal-header">
        <h3 class="modal-title">Comments</h3>
        <button class="modal-close" onclick="closeModal('comments-modal')">✕</button>
      </div>
      <div id="comments-list" style="max-height:320px;overflow-y:auto;margin-bottom:var(--space-lg)"></div>
      <div style="display:flex;gap:8px">
        <input type="hidden" id="comment-post-id">
        <input type="text" id="comment-text" class="form-control" placeholder="Add a comment..." onkeydown="if(event.key==='Enter')submitComment()">
        <button class="btn btn-primary" onclick="submitComment()">Reply</button>
      </div>
    </div>
  </div>

  <!-- Share to Chat Modal -->
  <div class="modal-backdrop" id="share-chat-modal"
       style="display:none;z-index:600"
       onclick="if(event.target===this)closeShareChatModal()">
    <div class="modal" style="max-width:420px">
      <div class="modal-header">
        <h3 class="modal-title">💬 Share to Chat</h3>
        <button class="modal-close" onclick="closeShareChatModal()">✕</button>
      </div>
      <p style="font-size:.85rem;color:var(--text-muted);margin-bottom:12px">Select a chat room to share this post:</p>
      <div id="share-chat-room-list" style="display:flex;flex-direction:column;gap:8px;max-height:260px;overflow-y:auto;margin-bottom:var(--space-md)"></div>
      <div class="form-group mb-md">
        <label class="form-label">Add a note (optional)</label>
        <input type="text" id="share-chat-note" class="form-control" placeholder="Check this out...">
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost btn-full" onclick="closeShareChatModal()">Cancel</button>
        <button class="btn btn-primary btn-full" onclick="confirmShareToChat()">📎 Share</button>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script src="/static/js/utils.js"></script>
  <script src="/static/js/api.js"></script>
  <script>
    let postType = 'achievement', PAGE_OFFSET = 0, PAGE_LIMIT = 20;
    const user = getUser() || {};

    onReady(async () => {
      requireAuth(); renderSidebar(); initMobileSidebar();
      // Handle chat prefill toast if redirected back
      const chatShare = sessionStorage.getItem('chat_share_post');
      if (chatShare) { sessionStorage.removeItem('chat_share_post'); }
      await loadFeed(true);
    });

    function setPostType(btn) {
      document.querySelectorAll('.type-pill').forEach(p=>p.classList.remove('selected'));
      btn.classList.add('selected');
      postType = btn.dataset.type;
    }

    async function loadFeed(reset = false) {
      if (reset) { PAGE_OFFSET = 0; document.getElementById('feed').innerHTML=''; }
      const data = await apiFetch(`/api/community/feed?limit=${PAGE_LIMIT}&offset=${PAGE_OFFSET}`, {}, false);
      if (data._error) return;
      PAGE_OFFSET += data.length;
      data.forEach(p => appendPost(p));
      document.getElementById('load-more').style.display = data.length === PAGE_LIMIT ? 'block' : 'none';
    }

    function loadMore() { loadFeed(false); }

    const POST_TYPE_ICONS = { update:'📢', achievement:'🏆', question:'❓', tip:'💡', progress_photo:'📸', template:'📋' };
    const POST_TYPE_COLORS = { achievement:'badge-amber', question:'badge-teal', tip:'badge-green', update:'badge-violet', progress_photo:'badge-violet', template:'badge-teal' };

    async function saveTemplateFromPost(meta) {
      if (!meta || !meta.exercises || !meta.exercises.length) {
        showToast('No exercises found in this template', 'warning');
        return;
      }
      const name = meta.template_name || 'Shared Template';
      const res = await apiFetch('/api/templates', {
        method: 'POST',
        body: {
          name,
          training_type: meta.training_type || 'gym',
          exercises: meta.exercises.map(e => ({ name: e.name, default_sets: e.default_sets || 3 }))
        }
      });
      if (!res._error) {
        showToast(`"${name}" saved to your Templates!`, 'success');
      }
    }

    function appendPost(p) {
      const div = document.createElement('div');
      div.className = 'post-card';
      div.id = `post-${p.id}`;
      const initials = (p.display_name || p.email || '?').substring(0,2).toUpperCase();
      const isOwn = p.user_id === user.user_id;

      // Template posts get a workout-plan card
      let bodyHtml;
      if (p.post_type === 'template' && p.meta_data) {
        let meta = {};
        try { meta = typeof p.meta_data === 'string' ? JSON.parse(p.meta_data) : p.meta_data; } catch(_) {}
        const exItems = (meta.exercises || []).map(e =>
          `<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(139,92,246,.1)">
            <span style="font-size:.9rem">💪</span>
            <span style="flex:1;font-size:.85rem">${escapeHtml(e.name)}</span>
            <span style="font-size:.75rem;color:var(--text-muted)">${e.default_sets || 3} sets</span>
          </div>`
        ).join('');
        const metaStr = JSON.stringify(meta).replace(/"/g, '&quot;');
        bodyHtml = `
          <div style="background:linear-gradient(145deg,rgba(20,184,166,.08),rgba(139,92,246,.06));border:1px solid rgba(20,184,166,.25);border-radius:12px;padding:16px;margin:12px 0;border-left:4px solid var(--accent-teal)">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
              <div style="font-size:2rem">📋</div>
              <div>
                <div style="font-weight:900;font-size:1rem">${escapeHtml(meta.template_name || 'Workout Template')}</div>
                <div style="font-size:.75rem;color:var(--text-muted);margin-top:2px">${(meta.exercises||[]).length} exercises · ${meta.training_type || 'gym'}</div>
              </div>
            </div>
            <div style="margin-bottom:12px">${exItems || '<div style="color:var(--text-muted);font-size:.8rem">No exercises listed</div>'}</div>
            ${!isOwn ? `<button class="btn btn-primary btn-sm" onclick='saveTemplateFromPost(${metaStr})'>💾 Save Template</button>` : '<span style="font-size:.75rem;color:var(--text-muted)">Your template</span>'}
          </div>`;
      } else if (p.post_type === 'achievement') {
        // Parse the structured text back to parts
        const lines = (p.content || '').split('\n').filter(Boolean);
        const titleLine = lines.find(l => l.startsWith('🏆 Achievement Unlocked:')) || lines[0] || '';
        const achievTitle = titleLine.replace('🏆 Achievement Unlocked:', '').trim();
        const exerciseLine = lines.find(l => l.startsWith('Exercise:')) || '';
        const resultLine   = lines.find(l => l.startsWith('Result:'))   || '';
        const captionLines = lines.filter(l =>
          !l.startsWith('🏆') && !l.startsWith('Exercise:') && !l.startsWith('Result:') && !l.startsWith('Date:')
        );

        bodyHtml = `
          <div style="background:linear-gradient(145deg,rgba(245,158,11,.08),rgba(139,92,246,.06));border:1px solid rgba(245,158,11,.25);border-radius:12px;padding:16px;margin:12px 0;border-left:4px solid var(--amber)">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
              <div style="font-size:2rem">🏆</div>
              <div>
                <div style="font-weight:900;font-size:1rem;color:var(--text)">${escapeHtml(achievTitle)}</div>
                ${exerciseLine ? `<div style="font-size:.75rem;color:var(--text-muted);margin-top:2px">${escapeHtml(exerciseLine.replace('Exercise:','').trim())}</div>` : ''}
              </div>
            </div>
            ${resultLine ? `<div style="font-size:1.2rem;font-weight:900;color:var(--amber);margin-bottom:8px">${escapeHtml(resultLine.replace('Result:','').trim())}</div>` : ''}
            ${captionLines.length ? `<div style="font-size:.88rem;color:var(--text-secondary);padding-top:8px;border-top:1px solid rgba(245,158,11,.15)">${captionLines.map(l=>escapeHtml(l)).join('<br>')}</div>` : ''}
            ${p.media_path ? `<img src="${p.media_path}" style="width:100%;border-radius:8px;margin-top:10px;object-fit:cover;max-height:240px;display:block">` : ''}
          </div>`;
      } else {
        bodyHtml = `
          <p class="post-content">${escapeHtml(p.content)}</p>
          ${p.media_path ? `<img src="${p.media_path}" style="width:100%;border-radius:8px;margin-top:8px;object-fit:cover;max-height:280px;display:block">` : ''}`;
      }

      div.innerHTML = `
        <div class="post-header">
          <div class="post-avatar">${initials}</div>
          <div class="post-meta">
            <div class="post-author">${p.display_name || p.email}</div>
            <div class="post-time">${formatTimeAgo(p.created_at)} · <span class="badge ${POST_TYPE_COLORS[p.post_type]||'badge-muted'}" style="font-size:.65rem">${POST_TYPE_ICONS[p.post_type]||''} ${p.post_type}</span></div>
          </div>
          ${isOwn ? `<button class="btn btn-ghost btn-icon" onclick="deletePost(${p.id})" style="margin-left:auto;color:var(--text-xmuted)">🗑</button>` : ''}
        </div>
        ${bodyHtml}
        <div class="post-actions">
          <button class="post-action-btn ${p.liked_by_me?'liked':''}" id="like-btn-${p.id}" onclick="toggleLike(${p.id})">
            ♥ <span id="likes-${p.id}">${p.likes_count}</span>
          </button>
          <button class="post-action-btn" onclick="openComments(${p.id})">
            💬 <span>${p.comment_count||0}</span> Comments
          </button>
          <button class="post-action-btn" onclick="sharePostToChat(${p.id})" data-content="${escapeHtml(p.content||'').substring(0,400)}" data-type="${p.post_type||'update'}" id="share-btn-${p.id}" title="Share to chat">
            📎 Share
          </button>
        </div>
      `;
      document.getElementById('feed').appendChild(div);
      // Attach content via JS to avoid HTML injection issues
      const shareBtn = document.getElementById(`share-btn-${p.id}`);
      if (shareBtn) shareBtn._postData = { id: p.id, content: p.content, type: p.post_type };
    }

    async function submitPost() {
      const content = document.getElementById('post-content').value.trim();
      if (!content) { showToast('Write something first!','warning'); return; }
      const res = await apiFetch('/api/community/posts', { method:'POST', body:{ content, post_type: postType } });
      if (!res._error) {
        document.getElementById('post-content').value = '';
        showToast('Posted!','success');
        await loadFeed(true);
      }
    }

    async function toggleLike(postId) {
      const res = await apiFetch(`/api/community/posts/${postId}/like`, { method:'POST' }, false);
      if (!res._error) {
        const btn = document.getElementById(`like-btn-${postId}`);
        const cnt = document.getElementById(`likes-${postId}`);
        const liked = res.liked;
        btn.classList.toggle('liked', liked);
        cnt.textContent = parseInt(cnt.textContent) + (liked ? 1 : -1);
      }
    }

    async function openComments(postId) {
      document.getElementById('comment-post-id').value = postId;
      openModal('comments-modal');
      const data = await apiFetch(`/api/community/posts/${postId}/comments`, {}, false);
      const list = document.getElementById('comments-list');
      if (!data?.length) {
        list.innerHTML = `<div class="empty-state" style="padding:var(--space-lg)"><div class="empty-icon">💬</div><p>No comments yet. Be first!</p></div>`;
      } else {
        list.innerHTML = data.map(c => `
          <div style="display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--bg-border)">
            <div style="width:32px;height:32px;border-radius:50%;background:var(--gradient-violet);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:800;color:white;flex-shrink:0">${(c.display_name||c.email||'?').substring(0,2).toUpperCase()}</div>
            <div><div style="font-weight:700;font-size:.85rem">${c.display_name||c.email}</div><div style="font-size:.85rem;color:var(--text-secondary)">${escapeHtml(c.content)}</div><div style="font-size:.7rem;color:var(--text-muted);margin-top:2px">${formatTimeAgo(c.created_at)}</div></div>
          </div>
        `).join('');
      }
    }

    async function submitComment() {
      const postId  = document.getElementById('comment-post-id').value;
      const content = document.getElementById('comment-text').value.trim();
      if (!content || !postId) return;
      const res = await apiFetch(`/api/community/posts/${postId}/comments`, { method:'POST', body:{ content } });
      if (!res._error) {
        document.getElementById('comment-text').value = '';
        await openComments(parseInt(postId));
        showToast('Comment added!','success');
      }
    }

    async function deletePost(postId) {
      if (!confirm('Delete this post?')) return;
      await apiFetch(`/api/community/posts/${postId}`, { method:'DELETE' });
      document.getElementById(`post-${postId}`)?.remove();
    }

    let _sharePostData = null;

    async function sharePostToChat(postId) {
      // Read post data from the button's _postData property (set after DOM append)
      const btn = document.getElementById(`share-btn-${postId}`);
      const data = btn?._postData || { id: postId, content: '', type: 'update' };
      _sharePostData = { postId: data.id, content: data.content || '', postType: data.type || 'update' };
      document.getElementById('share-chat-note').value = '';

      // Show modal (display:flex centres it via modal-backdrop styles)
      const modal = document.getElementById('share-chat-modal');
      modal.style.display = 'flex';

      // Load available rooms
      const roomListEl = document.getElementById('share-chat-room-list');
      roomListEl.innerHTML = '<div style="color:var(--text-muted);font-size:.85rem">Loading rooms…</div>';

      try {
        const rooms = await apiFetch('/api/chat/rooms', {}, false);
        if (!rooms || rooms._error || !rooms.length) {
          roomListEl.innerHTML = '<div style="color:var(--text-muted);font-size:.85rem">No chat rooms available.</div>';
          return;
        }
        _sharePostData._rooms = rooms;
        roomListEl.innerHTML = rooms.map(r => `
          <label style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg-card);border:1px solid var(--bg-border);border-radius:var(--radius-sm);cursor:pointer">
            <input type="checkbox" value="${r.id}" style="accent-color:var(--violet);width:16px;height:16px;flex-shrink:0">
            <div>
              <div style="font-weight:600;font-size:.9rem">${escapeHtml(r.name)}</div>
              <div style="font-size:.7rem;color:var(--text-muted)">${r.member_count || 0} members</div>
            </div>
          </label>
        `).join('');
      } catch(e) {
        roomListEl.innerHTML = '<div style="color:var(--text-muted)">Could not load rooms.</div>';
      }
    }

    async function confirmShareToChat() {
      if (!_sharePostData) return;
      const checked = Array.from(document.querySelectorAll('#share-chat-room-list input[type=checkbox]:checked'));
      if (!checked.length) { showToast('Please select at least one room', 'warning'); return; }

      const note = document.getElementById('share-chat-note').value.trim();
      const { postId, content, postType } = _sharePostData;

      // Format content: preserve existing newlines, truncate if very long
      const truncated = content.length > 500 ? content.substring(0, 497) + '…' : content;
      // Normalise line breaks so each exercise/set appears on its own line
      const formattedContent = truncated.replace(/\r\n/g, '\n').replace(/\r/g, '\n');

      let lines = ['📎 Shared from Community Feed:'];
      if (postType === 'template') lines.push('📋 Template Post');
      if (note) lines.push(`💬 "${note}"`);
      lines.push('─'.repeat(28));
      lines.push(...formattedContent.split('\n').map(l => l.trim()).filter(Boolean));
      if (postType === 'template') lines.push('\n➡️ View in Feed to save this template to your library');

      const msgText = lines.join('\n');

      let sent = 0;
      for (const cb of checked) {
        const roomId = parseInt(cb.value);
        const res = await apiFetch(`/api/chat/rooms/${roomId}/messages`, {
          method: 'POST', body: { message: msgText }
        }, false);
        if (!res._error) sent++;
      }

      closeShareChatModal();
      if (sent > 0) showToast(`Post shared to ${sent} chat room${sent > 1 ? 's' : ''}! ✅`, 'success');
    }

    function closeShareChatModal() {
      document.getElementById('share-chat-modal').style.display = 'none';
      _sharePostData = null;
    }

    async function saveTemplateFromPost(meta) {
      if (!meta || !meta.exercises) {
        showToast('Invalid template data', 'error');
        return;
      }
      
      const payload = {
        name: (meta.template_name || 'Imported Template') + ' (Shared)',
        training_type: meta.training_type || 'gym',
        exercises: meta.exercises
      };

      const res = await apiFetch('/api/templates', {
        method: 'POST',
        body: payload
      });

      if (!res._error) {
        showToast('Template saved to your library!', 'success');
        alert('Template Saved Successfully! Check your Templates page.');
      }
    }

    function escapeHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
  </script>
</body>
</html>
