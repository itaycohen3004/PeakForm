<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Create Account — PeakForm</title>
  <meta name="description" content="Create your free PeakForm account and start tracking your strength training journey.">
  <link rel="icon" href="/static/assets/logo.png">
  <link rel="stylesheet" href="/static/css/main.css">
  <link rel="stylesheet" href="/static/css/components.css">
</head>
<body class="auth-page">
  <div class="auth-card" style="max-width:480px">
    <div class="auth-logo">
      <div style="font-size:2.2rem;margin-bottom:8px">🏔️</div>
      <div class="auth-logo-text">PeakForm</div>
      <div style="font-size:.82rem;color:var(--text-muted);margin-top:4px">Create your free account</div>
    </div>
    <div class="auth-title">Start your journey</div>
    <div class="auth-subtitle">Join PeakForm and track your strength training</div>

    <!-- Inline error area -->
    <div id="reg-error" role="alert"
         style="display:none;background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.35);
                border-radius:var(--radius-md);padding:10px 14px;margin-bottom:var(--space-md);
                font-size:.88rem;color:#f87171;line-height:1.4">
    </div>

    <form id="register-form" onsubmit="handleRegister(event)" novalidate>
      <div class="form-group mb-md">
        <label class="form-label" for="display_name">Name / Handle</label>
        <input type="text" id="display_name" class="form-control" placeholder="e.g. Alex or IronAlex" autocomplete="name">
      </div>
      <div class="form-group mb-md">
        <label class="form-label" for="email">Email</label>
        <input type="email" id="email" class="form-control" placeholder="you@email.com" autocomplete="email">
      </div>
      <div class="form-group mb-md">
        <label class="form-label" for="password">Password</label>
        <div style="position:relative">
          <input type="password" id="password" class="form-control"
                 placeholder="Min 8 chars, mixed case + number" autocomplete="new-password">
          <button type="button" id="toggle-pw-btn" onclick="togglePW('password','toggle-pw-btn')"
                  style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;
                         cursor:pointer;color:var(--text-muted);font-size:.9rem;line-height:1"
                  aria-label="Toggle password visibility" title="Show / hide password">👁</button>
        </div>
      </div>
      <div class="form-group mb-md">
        <label class="form-label" for="confirm_password">Confirm Password</label>
        <div style="position:relative">
          <input type="password" id="confirm_password" class="form-control"
                 placeholder="Re-enter your password" autocomplete="new-password">
          <button type="button" id="toggle-cpw-btn" onclick="togglePW('confirm_password','toggle-cpw-btn')"
                  style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;
                         cursor:pointer;color:var(--text-muted);font-size:.9rem;line-height:1"
                  aria-label="Toggle confirm password visibility" title="Show / hide password">👁</button>
        </div>
      </div>
      <div class="form-group mb-lg">
        <label class="form-label">Training Style</label>
        <div class="training-type-grid">
          <label class="type-option">
            <input type="radio" name="training_type" value="gym" checked>
            <div class="type-card">🏋️<span>Gym</span></div>
          </label>
          <label class="type-option">
            <input type="radio" name="training_type" value="home">
            <div class="type-card">🏠<span>Home</span></div>
          </label>
          <label class="type-option">
            <input type="radio" name="training_type" value="calisthenics">
            <div class="type-card">🤸<span>Calisthenics</span></div>
          </label>
          <label class="type-option">
            <input type="radio" name="training_type" value="hybrid">
            <div class="type-card">⚡<span>Hybrid</span></div>
          </label>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" id="register-btn">Create Account</button>
    </form>

    <div style="text-align:center;margin-top:var(--space-lg);font-size:.85rem;color:var(--text-muted)">
      Already have an account? <a href="/login.html">Sign in →</a>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script src="/static/js/utils.js"></script>
  <script src="/static/js/api.js"></script>
  <script>
    if (isLoggedIn()) window.location.href = '/dashboard.html';

    // ── Password visibility toggle (shared for both fields) ────
    function togglePW(inputId, btnId) {
      const input = document.getElementById(inputId);
      const btn   = document.getElementById(btnId);
      if (input.type === 'password') {
        input.type      = 'text';
        btn.textContent = '🙈';
        btn.title       = 'Hide password';
      } else {
        input.type      = 'password';
        btn.textContent = '👁';
        btn.title       = 'Show password';
      }
    }

    // ── Inline error helpers ───────────────────────────────────
    function showRegError(msg) {
      const el = document.getElementById('reg-error');
      el.textContent  = msg;
      el.style.display = 'block';
    }

    function clearRegError() {
      const el = document.getElementById('reg-error');
      el.style.display = 'none';
      el.textContent   = '';
    }

    // ── Register handler ───────────────────────────────────────

    // Hide error box as soon as the user starts correcting any field
    ['display_name', 'email', 'password', 'confirm_password'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.addEventListener('input', clearRegError);
    });

    async function handleRegister(e) {
      e.preventDefault();
      clearRegError();

      const btn  = document.getElementById('register-btn');
      const form = document.getElementById('register-form');
      clearFieldErrors(form);

      const password        = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm_password').value;

      // Client-side: passwords must match before even sending to server
      if (password !== confirmPassword) {
        showRegError('❌ Passwords do not match. Please try again.');
        return;
      }

      btn.textContent = 'Creating account…'; btn.disabled = true;

      const payload = {
        display_name:  document.getElementById('display_name').value.trim(),
        email:         document.getElementById('email').value.trim(),
        password,
        confirm_password: confirmPassword,
        training_type: document.querySelector('input[name="training_type"]:checked')?.value || 'gym',
      };

      const res = await apiFetch('/api/auth/register', {
        method: 'POST',
        body: payload,
        skipAuthRedirect: true,
        silent: true,
      });
      btn.textContent = 'Create Account'; btn.disabled = false;

      if (res._error) {
        if (res.status === 0) {
          showRegError('⚠️ Server connection error. Please check that the server is running and try again.');
        } else if (res.status === 409) {
          showRegError('❌ This email is already registered. Please sign in or use a different email.');
        } else if (res.errors) {
          // Field-level validation errors from the backend
          showFieldErrors(res.errors);
          if (res.errors.email) {
            showRegError('❌ ' + res.errors.email);
          } else if (res.errors.password) {
            showRegError('❌ ' + (Array.isArray(res.errors.password) ? res.errors.password.join(' ') : res.errors.password));
          } else {
            showRegError('❌ Please fix the errors above and try again.');
          }
        } else {
          showRegError(res.message || 'Registration failed. Please try again.');
        }
        return;
      }

      saveAuth(res.token, {
        user_id:             res.user_id,
        email:               res.email,
        role:                res.role,
        display_name:        res.display_name,
        training_type:       payload.training_type,
        onboarding_complete: false,
      });

      showToast('Account created! Let\'s set up your profile.', 'success');
      setTimeout(() => { window.location.href = '/onboarding.html'; }, 800);
    }
  </script>
  <style>
    .training-type-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 8px;
    }
    .type-option input { display: none; }
    .type-card {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      padding: 12px 8px;
      background: var(--bg-input);
      border: 2px solid var(--bg-border);
      border-radius: var(--radius-md);
      cursor: pointer;
      font-size: .85rem;
      color: var(--text-muted);
      transition: all var(--transition);
    }
    .type-card span { font-size: .78rem; }
    .type-option input:checked + .type-card {
      border-color: var(--violet);
      background: rgba(139,92,246,.12);
      color: var(--violet-l);
    }
    .type-card:hover { border-color: var(--violet-d); }
    @media (max-width: 400px) {
      .training-type-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</body>
</html>

<!-- 
English Summary:
This HTML file defines the Registration form for new users, including client-side 
password strength validation and role assignment capabilities.
