<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Templates — PeakForm</title>
  <meta name="description" content="Manage your workout templates on PeakForm.">
  <link rel="icon" href="/static/assets/logo.png">
  <link rel="stylesheet" href="/static/css/main.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <style>
    .template-card {
      background: var(--bg-card);
      border: 1px solid var(--bg-border);
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
      margin-bottom: var(--space-md);
      transition: all var(--transition);
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
    }
    .template-card:hover { border-color: rgba(139,92,246,.25); }
    .template-header { display: flex; justify-content: space-between; align-items: flex-start; }
    .template-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 4px; }
    .template-meta { font-size: 0.8rem; color: var(--text-muted); }
    
    .template-exercise-list {
      background: rgba(0,0,0,.15);
      border-radius: var(--radius-md);
      padding: var(--space-md);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .template-exercise-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      background: var(--bg-surface);
      border: 1px solid var(--bg-border);
      border-radius: var(--radius-sm);
    }
    .ex-item-info { flex: 1; }
    .ex-item-name { font-weight: 700; font-size: 0.9rem; }
    .ex-item-meta { font-size: 0.75rem; color: var(--text-muted); }
    .ex-item-sets { font-family: monospace; font-size: 0.8rem; background: rgba(139,92,246,.15); color: var(--violet-l); padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body class="app-layout">
  <button class="mobile-menu-btn" id="mobile-menu-btn">☰</button>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main-content">
    <div class="page-header flex-between mb-xl">
      <div>
        <h1>📋 Templates</h1>
        <p>Manage your saved workout plans</p>
      </div>
      <button class="btn btn-primary" onclick="openTemplateModal('create')">+ New Template</button>
    </div>

    <div id="templates-list"><div class="skeleton skeleton-block"></div></div>
  </main>

  <!-- New Template Modal -->
  <div id="template-modal" class="modal-backdrop" style="display:none" onclick="if(event.target===this)closeModal('template-modal')">
    <div class="modal-box" style="max-width:540px;display:flex;flex-direction:column;">
      <div class="modal-header">
        <span class="modal-title" id="tpl-modal-title">✨ Create Template</span>
        <button class="modal-close" onclick="closeModal('template-modal')">✕</button>
      </div>
      
      <div class="form-group mb-md">
        <label class="form-label">Template Name</label>
        <input type="text" id="tpl-name" class="form-control" placeholder="e.g. Push Day A" required>
      </div>
      
      <div class="form-group mb-md">
        <label class="form-label">Training Type</label>
        <select id="tpl-type" class="form-control">
          <option value="gym">Gym</option>
          <option value="calisthenics">Calisthenics</option>
          <option value="hybrid">Hybrid</option>
          <option value="home">Home</option>
          <option value="functional">Functional</option>
        </select>
      </div>
      
      <div class="form-group mb-lg">
        <label class="form-label">Exercises</label>
        
        <div id="tpl-exercises-container" class="mb-md" style="display:flex;flex-direction:column;gap:8px"></div>
        
        <div class="exercise-search-wrap" id="tpl-exercise-search-wrap">
          <input type="text" id="tpl-exercise-search" class="form-control" placeholder="🔍 Search to add exercise..." oninput="searchTplExercises(this.value)" autocomplete="off">
          <div class="exercise-dropdown" id="tpl-exercise-dropdown"></div>
        </div>
      </div>
      
      <div style="display:flex;gap:12px;position:sticky;bottom:-16px;background:var(--bg-card);padding:16px 0;margin-top:auto;z-index:10;border-top:1px solid var(--bg-border)">
        <button type="button" class="btn btn-ghost btn-full" onclick="closeModal('template-modal')">Cancel</button>
        <button type="button" class="btn btn-primary btn-full" onclick="saveTemplate()" id="save-tpl-btn">Save Template</button>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script src="/static/js/utils.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/templates.js"></script>
</body>
</html>

<!-- 
English Summary:
This HTML file builds the Workout Templates manager. It displays saved routines and 
includes the dynamic modal for building a new multi-exercise template.

סיכום בעברית:
תצוגת ניהול תבניות האימון השמורות של המשתמש. קובץ זה בונה את המסגרת המאפשרת 
לראות אימונים קבועים (כמו "חזה-יד אחורית" או "פול באדי") ולייצר מהם אימונים מהירים.
-->
