<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Workout History — PeakForm</title>
  <link rel="icon" href="/static/assets/logo.png">
  <link rel="stylesheet" href="/static/css/main.css">
  <link rel="stylesheet" href="/static/css/components.css">
</head>
<body class="app-layout">
  <button class="mobile-menu-btn" id="mobile-menu-btn">☰</button>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main-content">
    <div class="page-header flex-between">
      <div><h1>Workout History</h1><p>All your sessions in one place</p></div>
      <a href="/log-workout.html" class="btn btn-primary">+ New Workout</a>
    </div>

    <div class="card">
      <div class="card-header mb-lg">
        <div>
          <h3 class="card-title">Full Diary</h3>
          <div style="font-size:.78rem;color:var(--text-muted);margin-top:2px">Every session — completed &amp; in-progress</div>
        </div>
        <span class="badge badge-violet" id="diary-count">—</span>
      </div>
      <div id="diary-list"><div class="skeleton skeleton-block"></div></div>
    </div>
  </main>

  <!-- Share Workout Modal -->
  <div id="share-workout-modal" class="modal" style="display:none" onclick="if(event.target===this)closeModal('share-workout-modal')">
    <div class="modal-box" style="max-width:540px">
      <div class="modal-header">
        <span class="modal-title">📢 Share Workout</span>
        <button class="modal-close" onclick="closeModal('share-workout-modal')">✕</button>
      </div>
      
      <div class="mb-md">
        <label class="form-label">Add a photo (optional)</label>
        <div id="share-photo-preview" style="display:none;margin-bottom:12px;position:relative">
          <img src="" id="share-photo-img" style="width:100%;max-height:240px;object-fit:cover;border-radius:var(--radius-md)">
          <button class="btn btn-sm btn-ghost" style="position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.5)" onclick="removeSharePhoto()">✕</button>
        </div>
        <input type="file" id="share-photo-input" accept="image/*" class="form-control" onchange="handleSharePhoto(event)">
      </div>

      <div class="form-group mb-lg">
        <label class="form-label">Add a caption</label>
        <textarea id="share-caption" class="form-control" rows="3" placeholder="Tell the community how it went..."></textarea>
      </div>

      <div style="font-size:0.8rem;color:var(--text-muted);margin-bottom:var(--space-md);padding:10px;background:var(--bg-surface);border-radius:4px">
        <em>Note: Your workout summary (exercises, sets, volume) will automatically be attached to this post.</em>
      </div>
      
      <button class="btn btn-primary btn-full" id="btn-submit-share" onclick="submitShareWorkout()">📢 Share to Feed</button>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script src="/static/js/utils.js"></script>
  <script src="/static/js/api.js"></script>
  <script>
    onReady(async () => {
      requireAuth(); renderSidebar(); initMobileSidebar();
      await loadAllWorkouts();
    });

    async function loadAllWorkouts() {
      const data = await apiFetch('/api/workouts?limit=200', {}, false);
      const el = document.getElementById('diary-list');
      if (data._error || !Array.isArray(data)) {
        el.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><h3>Could not load workouts</h3></div>`;
        return;
      }

      document.getElementById('diary-count').textContent = data.length + ' total';

      if (!data.length) {
        el.innerHTML = `<div class="empty-state"><div class="empty-icon">📓</div><h3>No sessions yet</h3><p><a href="/log-workout.html">Start logging</a></p></div>`;
        return;
      }

      // Group by month
      const groups = {};
      data.forEach(w => {
        let month = (w.workout_date || '').slice(0, 7);
        if (month.length < 7) month = 'Unknown';
        if (!groups[month]) groups[month] = [];
        groups[month].push(w);
      });

      const names = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      el.innerHTML = Object.keys(groups).sort().reverse().map(month => {
        let label = month;
        if (month !== 'Unknown') {
          const [y, m] = month.split('-');
          label = `${names[parseInt(m)-1] || ''} ${y}`;
        }
        const rows = groups[month]
          .sort((a,b) => (b.workout_date||'').localeCompare(a.workout_date||''))
          .map(diaryRow).join('');
        return `
          <div style="margin-bottom:var(--space-xl)">
            <div style="font-size:.78rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;padding:8px 0;border-bottom:1px solid var(--bg-border);margin-bottom:8px">
              ${label}
            </div>
            ${rows}
          </div>`;
      }).join('');
    }

    let _currentShareWorkout = null;
    let _sharePhotoFile = null;

    function diaryRow(w) {
      const isComplete = !!w.finished_at;
      return `<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)">
        <div style="width:10px;height:10px;border-radius:50%;flex-shrink:0;background:${isComplete?'var(--green)':'var(--amber)'}"></div>
        <div style="flex:1">
          <div style="font-weight:700;font-size:.9rem">${escHtml(w.name||'Session')}</div>
          <div style="font-size:.74rem;color:var(--text-muted)">${formatDate(w.workout_date)} · ${w.exercise_count||0} exercises · ${w.set_count||0} sets · ${isComplete?formatDuration(w.duration_minutes):'<em>In-progress</em>'}</div>
        </div>
        <div style="display:flex;gap:4px">
          <a href="/workout-detail.html?id=${w.id}" class="btn btn-ghost btn-sm">View</a>
          ${isComplete ? `<button class="btn btn-ghost btn-sm" onclick="openShareModal(${w.id}, '${escHtml(w.name).replace(/'/g,"\\'")}')" style="display:flex;align-items:center;gap:4px">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
            Share
          </button>` : `<a href="/log-workout.html?workout_id=${w.id}" class="btn btn-primary btn-sm">Continue</a>`}
        </div>
      </div>`;
    }

    function openShareModal(workoutId, workoutName) {
      _currentShareWorkout = { id: workoutId, name: workoutName };
      document.getElementById('share-caption').value = '';
      removeSharePhoto();
      openModal('share-workout-modal');
    }

    function handleSharePhoto(e) {
      const file = e.target.files[0];
      if (!file) return;
      _sharePhotoFile = file;
      const url = URL.createObjectURL(file);
      document.getElementById('share-photo-img').src = url;
      document.getElementById('share-photo-preview').style.display = 'block';
    }

    function removeSharePhoto() {
      _sharePhotoFile = null;
      document.getElementById('share-photo-input').value = '';
      document.getElementById('share-photo-preview').style.display = 'none';
      document.getElementById('share-photo-img').src = '';
    }

    async function submitShareWorkout() {
      if (!_currentShareWorkout) return;
      
      const btn = document.getElementById('btn-submit-share');
      btn.disabled = true;
      btn.textContent = 'Preparing Post...';
      
      // 1. Fetch workout details to build summary
      const wData = await apiFetch(`/api/workouts/${_currentShareWorkout.id}`);
      if (wData._error) {
        showToast('Failed to load workout details', 'error');
        btn.disabled = false; btn.textContent = '📢 Share to Feed';
        return;
      }
      
      // 2. Build summary text
      const caption = document.getElementById('share-caption').value.trim();
      const totalVol = (wData.exercises || []).reduce((acc, ex) =>
        acc + (ex.sets||[]).reduce((sAcc, s) => sAcc + ((s.weight_kg||0)*(s.reps||1)), 0), 0
      );
      const lines = [
        `🏋️ Workout Completed: ${_currentShareWorkout.name}`,
        `Duration: ${formatDuration(wData.duration_minutes || 0)} · Volume: ${Math.round(totalVol).toLocaleString()} kg`,
        '',
        'Exercises:'
      ];
      
      if (wData.exercises && wData.exercises.length) {
        wData.exercises.forEach(ex => {
          const workingSets = (ex.sets||[]).filter(s => !s.is_warmup);
          lines.push(`\n💪 ${ex.exercise_name}`);
          workingSets.forEach((s, i) => {
            const parts = [];
            if (s.weight_kg != null && s.weight_kg > 0) parts.push(`${s.weight_kg}kg`);
            if (s.reps != null) parts.push(`${s.reps} reps`);
            if (s.duration_seconds) parts.push(`${s.duration_seconds}s`);
            lines.push(`  Set ${i+1}: ${parts.join(' × ') || 'Bodyweight'}`);
          });
        });
      }
      
      if (caption) {
        lines.push('');
        lines.push(caption);
      }
      
      const content = lines.join('\n');
      btn.textContent = 'Posting...';
      
      // 3. Post to feed
      let res;
      if (_sharePhotoFile) {
        const fd = new FormData();
        fd.append('content', content);
        fd.append('post_type', 'achievement');
        fd.append('photo', _sharePhotoFile);
        res = await apiUpload('/api/community/posts/with-photo', fd);
      } else {
        res = await apiFetch('/api/community/posts', {
          method: 'POST',
          body: { content, post_type: 'achievement' },
        }, false);
      }

      btn.disabled = false;
      btn.textContent = '📢 Share to Feed';

      if (res && !res._error) {
        closeModal('share-workout-modal');
        launchConfetti(2000);
        showToast('Workout shared to feed! 🎉', 'success');
      } else {
        showToast('Failed to share — please try again', 'error');
      }
    }
  </script>
</body>
</html>

<!-- 
English Summary:
This HTML file provides the layout for the global Workout History log. It renders a 
searchable, filterable list of all past workouts completed by the user.
